{% extends 'base.html' %}
{% block title %}Şifre Sıfırla{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4">
            <h2>Şifremi Unuttum</h2>
            <p class="text-muted">E-posta adresinize sıfırlama bağlantısı gönderilecek.</p>
            <form method="post">{% csrf_token %}
                {{ form.email.label_tag }} {{ form.email }}
                <button class="btn btn-primary mt-3 w-100" type="submit">Gönder</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
