{% extends 'base.html' %}
{% block title %}{{ title }} — Proje Takip{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="page-header mb-4">
            <h1><i class="bi bi-person-plus me-2" style="color:var(--gold-light);"></i>{{ title }}</h1>
        </div>
        <div class="card p-4">
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}<div class="text-danger" style="font-size:12px;margin-top:4px;"><i class="bi bi-exclamation-circle me-1"></i>{{ field.errors.0 }}</div>{% endif %}
                </div>
                {% endfor %}
                <div class="d-flex gap-2 mt-2">
                    <button class="btn btn-primary"><i class="bi bi-save me-1"></i>Kaydet</button>
                    <a href="{% url 'accounts:student_list' %}" class="btn btn-outline-secondary">İptal</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
